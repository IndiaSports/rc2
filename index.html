*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:#000;

/* BG UPGRADE */
body::before{
content:"";

/* Layout */
.container{padding:20px}

/* LOGO */
.logo{
width:110px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 15px rgba(255,204,0,.5);
}

/* TEXT */
h1{
font-size:28px;
font-weight:700;
letter-spacing:1px;
}

.tagline{
color:#ccc;
font-size:13px;
margin:8px 0 15px
}

/* CARD */
.card{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-radius:16px;
padding:18px;
max-width:320px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
}

/* GAMES */
.games div{
padding:10px 0;
display:flex;
justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:14px;
}

.games div:last-child{border:none}

.rank{color:#ffcc00;font-weight:600}

/* 🔥 MAIN CTA */
.btn{
display:block;
margin-top:18px;
padding:14px;
border-radius:40px;
background:linear-gradient(45deg,#ffcc00,#ff9900);
color:#000;
font-weight:700;
text-decoration:none;
transition:.2s;
box-shadow:0 0 20px rgba(255,204,0,.6);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* TRUST BAR */
.trust{
margin-top:12px;
font-size:12px;
color:#aaa;
}

/* WHATSAPP FLOAT */
.whatsapp{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
padding:12px 16px;
border-radius:30px;
color:#fff;
font-size:14px;
text-decoration:none;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
animation:blink 1.5s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.6}
100%{opacity:1}
}

/* FOOTER */
.footer{
margin-top:20px;
font-size:11px;
color:#ccc;
}
