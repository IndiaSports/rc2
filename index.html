<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Club 247</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:url('https://d1yei2z3i6k35z.cloudfront.net/13184094/69b963ab27e226.84852513_Gemini_Generated_Image_w6hfatw6hfatw6hf.png') no-repeat center/cover;
  color:#fff;
  text-align:center;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  top:0;
  left:0;
  z-index:-1;
}

/* container */
.container{
  padding:30px 20px;
}

/* logo */
.logo{
  width:110px;
  border-radius:50%;
  box-shadow:0 0 25px gold;
  margin-bottom:15px;
}

/* title */
h1{
  font-size:32px;
  font-weight:600;
  letter-spacing:1px;
}

.tagline{
  color:#ccc;
  margin:10px 0 20px;
  font-size:14px;
}

/* card */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:15px;
  padding:20px;
  margin:20px auto;
  max-width:350px;
  box-shadow:0 0 25px rgba(255,215,0,0.2);
}

/* games */
.games div{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;
  justify-content:space-between;
}

.games div:last-child{
  border:none;
}

.rank{
  color:gold;
  font-weight:600;
}

/* button */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 25px;
  border-radius:30px;
  background:linear-gradient(45deg,gold,#ffcc00);
  color:#000;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

/* floating button */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:12px 18px;
  border-radius:50px;
  font-size:14px;
  text-decoration:none;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.whatsapp-float:hover{
  background:#1ebe5d;
}

/* footer */
.footer{
  margin-top:25px;
  font-size:12px;
  color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<img src="https://d1yei2z3i6k35z.cloudfront.net/13184094/69b95e20b19737.71892544_IMG_5760.PNG" class="logo">

<h1>Royal Club 247</h1>
<p class="tagline">India’s Best Gaming Platform 👑</p>

<div class="card">
  <h3>🔥 Popular Games</h3>

  <div class="games">
    <div><span>Cricket</span> <span class="rank">#1</span></div>
    <div><span>Tennis</span> <span class="rank">#2</span></div>
    <div><span>C###no</span> <span class="rank">#3</span></div>
    <div><span>Football</span> <span class="rank">#4</span></div>
    <div><span>Hockey</span> <span class="rank">#5</span></div>
  </div>

  <a href="https://api.whatsapp.com/send?phone=916398016526&text=I%20want%20ID" class="btn">
    Get Your ID Now
  </a>

</div>

<p class="footer">Secure • Fast • Trusted Platform</p>

</div>

<!-- Floating WhatsApp -->
<a href="https://api.whatsapp.com/send?phone=916398016526&text=I%20want%20ID" 
class="whatsapp-float">
💬 WhatsApp
</a>

</body>
</html>
